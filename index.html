<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Colorful Sliders with Controls</title>
    <style>
        /* Dark theme setup and centering */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            margin-bottom: 30px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .sliders-wrapper {
            width: 90%;
            max-width: 600px;
            padding: 30px;
            background-color: #1a1a1e;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .slider-container {
            margin-bottom: 35px;
        }

        .slider-container:last-child {
            margin-bottom: 0;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.95em;
        }

        .value-display {
            font-size: 1.1em;
            font-weight: bold;
        }

        /* Base slider styling across all browsers */
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #334155;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            margin-bottom: 12px;
        }

        /* WebKit (Chrome, Safari, Edge) Thumb Styling */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Color Themes using accent-color for modern browsers */
        .slider-red input[type="range"] { accent-color: #ef4444; }
        .slider-blue input[type="range"] { accent-color: #3b82f6; }
        .slider-yellow input[type="range"] { accent-color: #eab308; }

        .slider-red .value-display { color: #ef4444; }
        .slider-blue .value-display { color: #3b82f6; }
        .slider-yellow .value-display { color: #eab308; }

        /* Button Layout and Styling */
        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn-group button {
            background-color: #27272a;
            color: #e2e8f0;
            border: 1px solid #3f3f46;
            padding: 6px 12px;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 45px;
        }

        /* Specific hover highlights matching the theme */
        .slider-red button:hover { background-color: #ef4444; color: #fff; border-color: #ef4444; }
        .slider-blue button:hover { background-color: #3b82f6; color: #fff; border-color: #3b82f6; }
        .slider-yellow button:hover { background-color: #eab308; color: #000; border-color: #eab308; }
        
        .btn-group button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2>Interactive Sliders</h2>

    <div class="sliders-wrapper">
        <div class="slider-container slider-red">
            <div class="slider-header">
                <label for="slider1">Slider A</label>
                <div class="value-display"><span id="val1">100</span></div>
            </div>
            <input type="range" id="slider1" min="0" max="100" value="100" oninput="updateValue('slider1', 'val1')">
            <div class="btn-group">
                <button onclick="adjustValue('slider1', 'val1', -20)">-20</button>
                <button onclick="adjustValue('slider1', 'val1', -10)">-10</button>
                <button onclick="adjustValue('slider1', 'val1', -5)">-5</button>
                <button onclick="adjustValue('slider1', 'val1', 5)">+5</button>
                <button onclick="adjustValue('slider1', 'val1', 10)">+10</button>
                <button onclick="adjustValue('slider1', 'val1', 20)">+20</button>
            </div>
        </div>

        <div class="slider-container slider-blue">
            <div class="slider-header">
                <label for="slider2">Slider B</label>
                <div class="value-display"><span id="val2">100</span></div>
            </div>
            <input type="range" id="slider2" min="0" max="100" value="100" oninput="updateValue('slider2', 'val2')">
            <div class="btn-group">
                <button onclick="adjustValue('slider2', 'val2', -20)">-20</button>
                <button onclick="adjustValue('slider2', 'val2', -10)">-10</button>
                <button onclick="adjustValue('slider2', 'val2', -5)">-5</button>
                <button onclick="adjustValue('slider2', 'val2', 5)">+5</button>
                <button onclick="adjustValue('slider2', 'val2', 10)">+10</button>
                <button onclick="adjustValue('slider2', 'val2', 20)">+20</button>
            </div>
        </div>

        <div class="slider-container slider-yellow">
            <div class="slider-header">
                <label for="slider3">Slider C</label>
                <div class="value-display"><span id="val3">0</span></div>
            </div>
            <input type="range" id="slider3" min="0" max="100" value="0" oninput="updateValue('slider3', 'val3')">
            <div class="btn-group">
                <button onclick="adjustValue('slider3', 'val3', -20)">-20</button>
                <button onclick="adjustValue('slider3', 'val3', -10)">-10</button>
                <button onclick="adjustValue('slider3', 'val3', -5)">-5</button>
                <button onclick="adjustValue('slider3', 'val3', 5)">+5</button>
                <button onclick="adjustValue('slider3', 'val3', 10)">+10</button>
                <button onclick="adjustValue('slider3', 'val3', 20)">+20</button>
            </div>
        </div>
    </div>

    <script>
        // Updates the text display when dragging the slider directly
        function updateValue(sliderId, displayId) {
            const slider = document.getElementById(sliderId);
            document.getElementById(displayId).textContent = slider.value;
        }

        // Adjusts the slider when clicking the buttons, ensuring boundaries stay between 0 and 100
        function adjustValue(sliderId, displayId, amount) {
            const slider = document.getElementById(sliderId);
            let newValue = parseInt(slider.value) + amount;
            
            // Constrain values between 0 and 100
            if (newValue > 100) newValue = 100;
            if (newValue < 0) newValue = 0;
            
            slider.value = newValue;
            document.getElementById(displayId).textContent = newValue;
        }
    </script>

</body>
</html>

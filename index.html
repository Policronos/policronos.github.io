<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Dias Sem Rede</title>
    <style>
        /* Dark theme setup and centering */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .sliders-container {
            width: 90%;
            max-width: 600px;
        }

        /* Each slider is contained inside its own isolated block */
        .slider-block {
            background-color: #1a1a1e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .slider-block:last-child {
            margin-bottom: 0;
        }

        /* Centered layout for headers and values */
        .slider-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            gap: 5px;
        }

        label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value-display {
            font-size: 2em;
            font-weight: 700;
            line-height: 1;
        }

        /* Base slider track styling */
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            margin-bottom: 15px;
            background: #334155; 
            transform: translate3d(0, 0, 0);
        }

        /* WebKit Thumb Styling */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* Specific text colors for the centered numbers */
        .slider-red .value-display { color: #ef4444; }
        .slider-blue .value-display { color: #3b82f6; }

        /* Button Layout and Styling */
        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap; /* Allows buttons to wrap gracefully on smaller mobile screens */
        }

        .btn-group button {
            background-color: #27272a;
            color: #e2e8f0;
            border: 1px solid #3f3f46;
            padding: 8px 12px;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 45px;
            touch-action: manipulation; 
        }

        /* Theme-specific button hover logic */
        .slider-red button:hover { background-color: #ef4444; color: #fff; border-color: #ef4444; }
        .slider-blue button:hover { background-color: #3b82f6; color: #fff; border-color: #3b82f6; }
        
        .btn-group button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="sliders-container">
        
        <div class="slider-block slider-red">
            <div class="slider-header">
                <label for="slider1">Vida</label>
                <div class="value-display" id="val1">50</div>
            </div>
            <input type="range" id="slider1" min="0" max="50" value="50" data-color="#ef4444" data-val-id="val1">
            <div class="btn-group">
                <button onclick="adjustValue('slider1', -20)">-20</button>
                <button onclick="adjustValue('slider1', -15)">-15</button>
                <button onclick="adjustValue('slider1', -10)">-10</button>
                <button onclick="adjustValue('slider1', -5)">-5</button>
                <button onclick="adjustValue('slider1', 5)">+5</button>
                <button onclick="adjustValue('slider1', 10)">+10</button>
                <button onclick="adjustValue('slider1', 15)">+15</button>
                <button onclick="adjustValue('slider1', 20)">+20</button>
            </div>
        </div>

        <div class="slider-block slider-blue">
            <div class="slider-header">
                <label for="slider2">Stamina</label>
                <div class="value-display" id="val2">50</div>
            </div>
            <input type="range" id="slider2" min="0" max="50" value="50" data-color="#3b82f6" data-val-id="val2">
            <div class="btn-group">
                <button onclick="adjustValue('slider2', -20)">-20</button>
                <button onclick="adjustValue('slider2', -15)">-15</button>
                <button onclick="adjustValue('slider2', -10)">-10</button>
                <button onclick="adjustValue('slider2', -5)">-5</button>
                <button onclick="adjustValue('slider2', 5)">+5</button>
                <button onclick="adjustValue('slider2', 10)">+10</button>
                <button onclick="adjustValue('slider2', 15)">+15</button>
                <button onclick="adjustValue('slider2', 20)">+20</button>
            </div>
        </div>

    </div>

    <script>
        // Updates slider value text and paints the colored track trail based on max limit
        function updateSlider(slider) {
            const value = slider.value;
            const max = slider.max || 50;
            const color = slider.getAttribute('data-color');
            const displayId = slider.getAttribute('data-val-id');
            
            const percentage = (value / max) * 100;
            
            document.getElementById(displayId).textContent = value;
            
            requestAnimationFrame(() => {
                slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percentage}%, #334155 ${percentage}%, #334155 100%)`;
            });
        }

        // Attach event listeners for smooth touch/drag tracking
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            ['input', 'change', 'touchmove'].forEach(evt => {
                slider.addEventListener(evt, () => updateSlider(slider));
            });
            updateSlider(slider);
        });

        // Handles button increments/decrements with bounds tracking (0 to 50)
        function adjustValue(sliderId, amount) {
            const slider = document.getElementById(sliderId);
            const max = parseInt(slider.max);
            let newValue = parseInt(slider.value) + amount;
            
            if (newValue > max) newValue = max;
            if (newValue < 0) newValue = 0;
            
            slider.value = newValue;
            updateSlider(slider);
        }
    </script>

</body>
</html>

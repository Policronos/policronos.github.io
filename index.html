<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Dias Sem Rede</title>
    <style>
        /* Dark theme setup and centering */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .sliders-container {
            width: 90%;
            max-width: 600px;
        }

        /* Each slider is now contained inside its own isolated block */
        .slider-block {
            background-color: #1a1a1e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .slider-block:last-child {
            margin-bottom: 0;
        }

        /* Centered layout for headers and values */
        .slider-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            gap: 5px;
        }

        label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value-display {
            font-size: 2em;
            font-weight: 700;
            line-height: 1;
        }

        /* Base slider track styling */
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            margin-bottom: 15px;
            /* Default background before JavaScript updates the dynamic gradient trail */
            background: #334155; 
        }

        /* WebKit (Chrome, Safari, Edge) Thumb Styling */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Specific text colors for the centered numbers */
        .slider-red .value-display { color: #ef4444; }
        .slider-blue .value-display { color: #3b82f6; }
        .slider-yellow .value-display { color: #eab308; }

        /* Button Layout and Styling */
        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn-group button {
            background-color: #27272a;
            color: #e2e8f0;
            border: 1px solid #3f3f46;
            padding: 6px 12px;
            font-size: 0.85em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 45px;
        }

        /* Theme-specific button hover logic */
        .slider-red button:hover { background-color: #ef4444; color: #fff; border-color: #ef4444; }
        .slider-blue button:hover { background-color: #3b82f6; color: #fff; border-color: #3b82f6; }
        .slider-yellow button:hover { background-color: #eab308; color: #000; border-color: #eab308; }
        
        .btn-group button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="sliders-container">
        
        <div class="slider-block slider-red">
            <div class="slider-header">
                <label for="slider1">Vida</label>
                <div class="value-display" id="val1">100</div>
            </div>
            <input type="range" id="slider1" min="0" max="100" value="100" oninput="updateSlider('slider1', 'val1', '#ef4444')">
            <div class="btn-group">
                <button onclick="adjustValue('slider1', 'val1', -20, '#ef4444')">-20</button>
                <button onclick="adjustValue('slider1', 'val1', -10, '#ef4444')">-10</button>
                <button onclick="adjustValue('slider1', 'val1', -5, '#ef4444')">-5</button>
                <button onclick="adjustValue('slider1', 'val1', 5, '#ef4444')">+5</button>
                <button onclick="adjustValue('slider1', 'val1', 10, '#ef4444')">+10</button>
                <button onclick="adjustValue('slider1', 'val1', 20, '#ef4444')">+20</button>
            </div>
        </div>

        <div class="slider-block slider-blue">
            <div class="slider-header">
                <label for="slider2">Stamina</label>
                <div class="value-display" id="val2">100</div>
            </div>
            <input type="range" id="slider2" min="0" max="100" value="100" oninput="updateSlider('slider2', 'val2', '#3b82f6')">
            <div class="btn-group">
                <button onclick="adjustValue('slider2', 'val2', -20, '#3b82f6')">-20</button>
                <button onclick="adjustValue('slider2', 'val2', -10, '#3b82f6')">-10</button>
                <button onclick="adjustValue('slider2', 'val2', -5, '#3b82f6')">-5</button>
                <button onclick="adjustValue('slider2', 'val2', 5, '#3b82f6')">+5</button>
                <button onclick="adjustValue('slider2', 'val2', 10, '#3b82f6')">+10</button>
                <button onclick="adjustValue('slider2', 'val2', 20, '#3b82f6')">+20</button>
            </div>
        </div>

        <div class="slider-block slider-yellow">
            <div class="slider-header">
                <label for="slider3">Sabedoria</label>
                <div class="value-display" id="val3">0</div>
            </div>
            <input type="range" id="slider3" min="0" max="100" value="0" oninput="updateSlider('slider3', 'val3', '#eab308')">
            <div class="btn-group">
                <button onclick="adjustValue('slider3', 'val3', -20, '#eab308')">-20</button>
                <button onclick="adjustValue('slider3', 'val3', -10, '#eab308')">-10</button>
                <button onclick="adjustValue('slider3', 'val3', -5, '#eab308')">-5</button>
                <button onclick="adjustValue('slider3', 'val3', 5, '#eab308')">+5</button>
                <button onclick="adjustValue('slider3', 'val3', 10, '#eab308')">+10</button>
                <button onclick="adjustValue('slider3', 'val3', 20, '#eab308')">+20</button>
            </div>
        </div>

    </div>

    <script>
        // Updates slider value text and paints the colored track trail
        function updateSlider(sliderId, displayId, color) {
            const slider = document.getElementById(sliderId);
            const value = slider.value;
            
            // Update the text value
            document.getElementById(displayId).textContent = value;
            
            // Create a dynamic linear-gradient trail that fills up exactly to the slider's current percentage
            slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${value}%, #334155 ${value}%, #334155 100%)`;
        }

        // Adjusts value when button is clicked and synchronizes the trail update
        function adjustValue(sliderId, displayId, amount, color) {
            const slider = document.getElementById(sliderId);
            let newValue = parseInt(slider.value) + amount;
            
            if (newValue > 100) newValue = 100;
            if (newValue < 0) newValue = 0;
            
            slider.value = newValue;
            updateSlider(sliderId, displayId, color);
        }

        // Initialize trails on page load
        window.onload = function() {
            updateSlider('slider1', 'val1', '#ef4444');
            updateSlider('slider2', 'val2', '#3b82f6');
            updateSlider('slider3', 'val3', '#eab308');
        };
    </script>

</body>
</html>
